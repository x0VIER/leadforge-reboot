version = 1
id = "leadforge-florida-loop"
kind = "heartbeat"
name = "LeadForge Lead Factory Loop"
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=45"

# This file is the repo-owned reference for the Codex app heartbeat.
# The live automation lives under CODEX_HOME/automations and should match this intent.
prompt = """
Continue the LeadForge reboot inside C:\Users\loc9o\Desktop\AGR 1226.
Read LeadForge_Reboot\config\source-lanes.json first and use targetState as the current sourcing state; FL is only the default, not a hardcoded limit.
Refresh status files for that target state with:
- LeadForge_Reboot\scripts\build-pending-enrichment-report.ps1
- LeadForge_Reboot\scripts\build-owner-enrichment-backlog.ps1 -State <targetState>
- LeadForge_Reboot\scripts\build-master-contamination-audit.ps1 -State <targetState>
- LeadForge_Reboot\scripts\build-ops-snapshot.ps1 -State <targetState>
Read LeadForge_Reboot\agent_shared\status\OPS_SNAPSHOT.json before deciding the next action.
Before any collector run, run LeadForge_Reboot\scripts\get-collector-guard-status.ps1 and treat it as the source of truth for overlap and stale-claim detection.
